<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coupon Hunter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="spark">✦</span>
          <span class="brand-name">Coupon Hunter</span>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="refreshBtn" title="Re-scan the web">
            <svg viewBox="0 0 16 16" width="14" height="14"><path d="M13.65 2.35a8 8 0 1 0 1.85 8.4l-1.6-.7a6.3 6.3 0 1 1-1.5-7.1L9.5 5.5H15V0Z" fill="currentColor"/></svg>
          </button>
          <button class="icon-btn" id="settingsBtn" title="Settings">
            <svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 10.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Zm5.93-1.5a5.95 5.95 0 0 0 0-2l1.7-1.3-1.5-2.6-2 .7a6 6 0 0 0-1.74-1l-.3-2.1h-3l-.3 2.1a6 6 0 0 0-1.74 1l-2-.7L1.55 5.7l1.7 1.3a5.95 5.95 0 0 0 0 2l-1.7 1.3 1.5 2.6 2-.7a6 6 0 0 0 1.74 1l.3 2.1h3l.3-2.1a6 6 0 0 0 1.74-1l2 .7 1.5-2.6Z" fill="currentColor"/></svg>
          </button>
        </div>
      </header>

      <section class="savings" id="savings">
        <div class="savings-amt" id="savingsTotal">$0.00</div>
        <div class="savings-cap">saved with Coupon Hunter</div>
        <div class="savings-sub">
          <span id="savingsCount">0</span> coupons applied ·
          <span id="savingsStores">0</span> stores
        </div>
      </section>

      <section class="wins" id="wins" hidden>
        <div class="section-label"><span>Recent wins</span></div>
        <div class="wins-list" id="winsList"></div>
      </section>

      <section class="hero">
        <div class="hero-domain" id="heroDomain">Loading…</div>
        <div class="hero-prompt" id="heroPrompt">Press <kbd>↵</kbd> to hunt coupons</div>
        <button class="primary-btn" id="huntBtn">
          <span class="spark">✦</span>
          <span>Find me the best coupon</span>
        </button>
      </section>

      <section class="results" id="results" hidden>
        <div class="section-label">
          <span>Found codes</span>
          <span class="counter" id="counter">0</span>
        </div>
        <div class="codes" id="codes"></div>
      </section>

      <section class="empty" id="empty">
        <div class="empty-icon">✦</div>
        <div class="empty-title">No hunt yet</div>
        <div class="empty-sub">Click <b>Find me the best coupon</b> to scan 10+ coupon sites for this shop.</div>
      </section>

      <section class="progress" id="progress" hidden>
        <div class="progress-label" id="progressLabel">Scanning…</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <ul class="source-list" id="sourceList"></ul>
      </section>

      <footer class="footer">
        <button class="ghost-btn" id="autoApplyBtn" disabled>
          <span>Auto-apply on this page</span>
          <span class="kbd">⌥ ↵</span>
        </button>
        <div class="footer-meta" id="footerMeta">Idle</div>
      </footer>
    </div>

    <div class="settings-sheet" id="settingsSheet" hidden>
      <div class="sheet-head">
        <span>Settings</span>
        <button class="icon-btn" id="closeSettings" aria-label="Close">×</button>
      </div>
      <div class="sheet-body">
        <label class="setting-row">
          <span>Coupon Hunter enabled</span>
          <input type="checkbox" id="optEnabled" />
        </label>
        <label class="setting-row">
          <span>Pause on <b id="pauseDomain">this site</b></span>
          <input type="checkbox" id="optPauseSite" />
        </label>
        <div class="sheet-divider"></div>
        <label class="setting-row">
          <span>Auto-hunt on every page load</span>
          <input type="checkbox" id="optAutoHunt" />
        </label>
        <label class="setting-row">
          <span>Auto-apply when checkout detected</span>
          <input type="checkbox" id="optAutoApply" />
        </label>
        <label class="setting-row">
          <span>Show floating card on merchant pages</span>
          <input type="checkbox" id="optFloatCard" checked />
        </label>
        <label class="setting-row">
          <span>Cache TTL (hours)</span>
          <input type="number" id="optTtl" min="1" max="168" value="6" />
        </label>
        <button class="ghost-btn full" id="clearCache">Clear cached codes</button>
        <button class="ghost-btn full" id="resetSavings">Reset savings counter</button>
        <a class="sheet-link" id="sourceLink" href="https://github.com/Xer0z-gh/coupon-hunter" target="_blank" rel="noopener">★ Star us on GitHub — free &amp; open source</a>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
